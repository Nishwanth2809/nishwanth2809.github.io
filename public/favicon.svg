<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>
  <!-- Letter N -->
  <text x="32" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="38" fill="#ffffff" letter-spacing="-1">N</text>
  <!-- Small AI circuit dot accent -->
  <circle cx="52" cy="12" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="52" cy="12" r="2" fill="#ffffff" opacity="0.6"/>
</svg>